<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
        text-align: center;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    h1 {
        font-size: 50px;
        color: white;
        margin-top: 50px;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 20px #ff4da6; }
    }

    .card {
        background: white;
        padding: 25px;
        margin: 40px auto;
        width: 350px;
        border-radius: 20px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    p {
        font-size: 18px;
        color: #333;
    }

    img {
        width: 250px;
        border-radius: 15px;
        margin: 15px 0;
    }

    button {
        background: #ff4da6;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #e60073;
    }

    /* Balloon animation */
    .balloon {
        position: absolute;
        bottom: -100px;
        width: 50px;
        height: 70px;
        background: red;
        border-radius: 50%;
        animation: float 6s infinite;
    }

    @keyframes float {
        from { transform: translateY(0); }
        to { transform: translateY(-800px); }
    }
</style>
</head>

<body>

<h1>🎉 Happy Birthday 💖</h1>

<div class="card">
    <img src="https://i.imgur.com/3ZQ3Z4T.png" alt="Cake">

    <p>Dear <b>[Her Name]</b>,</p>

    <p>
        Wishing you a day filled with happiness, laughter, and lots of love 💕  
        You are truly special and I’m lucky to have you in my life 🌸
    </p>

    <button onclick="showMessage()">Click for Surprise 🎁</button>
</div>

<audio autoplay loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/mpeg">
</audio>

<script>
function showMessage() {
    alert("💖 Once again Happy Birthday! Stay happy always 😊");
}

// create balloons
for (let i = 0; i < 10; i++) {
    let balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.style.left = Math.random() * 100 + "vw";
    balloon.style.background = ["red","blue","yellow","pink","purple"][Math.floor(Math.random()*5)];
    balloon.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(balloon);
}
</script>

</body>
</html>
