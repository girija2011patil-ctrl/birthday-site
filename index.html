<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Mayuri 💖</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    h1 {
        font-size: 50px;
        color: white;
        margin-top: 40px;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 25px #ff4da6; }
    }

    .card {
        background: white;
        padding: 25px;
        margin: 30px auto;
        width: 350px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    img {
        width: 220px;
        border-radius: 15px;
        margin: 15px 0;
        border: 3px solid #ff4da6;
    }

    p {
        font-size: 18px;
        color: #333;
    }

    button {
        background: #ff4da6;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #e60073;
    }

    /* typing effect */
    .typing {
        font-size: 18px;
        color: #444;
        border-right: 2px solid black;
        width: 0;
        overflow: hidden;
        white-space: nowrap;
        margin: auto;
        animation: typing 4s steps(40, end) forwards;
    }

    @keyframes typing {
        from { width: 0; }
        to { width: 100%; }
    }

    /* balloons */
    .balloon {
        position: absolute;
        bottom: -100px;
        width: 50px;
        height: 70px;
        border-radius: 50%;
        animation: float 6s infinite;
    }

    @keyframes float {
        from { transform: translateY(0); }
        to { transform: translateY(-800px); }
    }
</style>
</head>

<body>

<h1>🎉 Happy Birthday Maiiiii😘😘😘😘😘😘😘😘😘 💖</h1>

<div class="card">

    <!-- 👉 Put her image here -->
    <img src="her.jpg" alt="Mayuri">

    <p><b>Dear Mayuri,</b></p>

    <p class="typing">
        Wishing you endless happiness, love, and success 💕
    </p>

    <p>
        You are truly special and make life more beautiful 🌸  
        I hope your day is filled with smiles and surprises 🎁
    </p>

    <button onclick="showMessage()">Click for Surprise 🎁</button>

</div>

<audio autoplay loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>
function showMessage() {
    alert("💖 Happy Birthday Maiiiiiiiii! Stay happy always 😊....Love u alottttttttt😘😘😘😘😘😘😘😘😘");
}

// balloons
for (let i = 0; i < 12; i++) {
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random() * 100 + "vw";
    b.style.background = ["red","blue","yellow","pink","purple"][Math.floor(Math.random()*5)];
    b.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(b);
}
</script>

</body>
</html>
